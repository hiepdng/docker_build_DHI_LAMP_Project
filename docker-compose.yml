services:
  httpd:
    build:
      context: ./versions/${HTTPDVERSION}
      args:
        - HTTPD_CERT_SUBJ=${HTTPD_CERT_SUBJ}
        - SERVER_NAME=${SERVER_NAME}
        - SERVER_ADMIN=${SERVER_ADMIN}
    image: "${PROJECT_NAME}-${HTTPDVERSION}"
    container_name: "${PROJECT_NAME}-httpd"
    hostname: "httpd_server"
    user: "${UID}:${GID}"
    restart: always
    ports:
      - "${HOST_UNSECURE_PORT}:8080"
      - "${HOST_SECURE_PORT}:443"
    environment:
      - HTTPD_PREFIX=/usr/local/apache2
      - HTTPD_VERSION=2.4.68
      - LD_LIBRARY_PATH=/usr/local/apr/lib:/usr/local/apr-util/lib
      - PATH=/usr/local/apache2/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
    volumes:
      - ${DOCUMENT_ROOT}:/usr/local/apache2/htdocs:ro
      - ${HTTPD_CERT_DIR}:/usr/local/apache2/conf/certs
      - ./log/httpd:/usr/local/apache2/logs
      - ./etc/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./etc/httpd-ssl.conf:/usr/local/apache2/conf/extra/httpd-ssl.conf
    depends_on:
      - php-fpm
    networks:
      custom_network:
        ipv4_address: 172.1.0.2
  mysqld:
    build:
      context: ./versions/${MYSQLVERSION}
    image:  "${PROJECT_NAME}-${MYSQLVERSION}"
    container_name: "${PROJECT_NAME}-mysql"
    hostname: "mysql_server"
    user: "${UID}:${GID}"
    restart: always
    ports:
      - "${HOST_MYSQL_PORT}:3306"
      - "${HOST_MYSQLX_PORT}:33060"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    command: mysqld
    volumes:
      - ${MYSQL_DATA_DIR}:/var/lib/mysql
      - ${MYSQL_CERT_DIR}:/opt/mysql/certs
      - ./etc/my.cnf:/etc/my.cnf
    networks:
      custom_network:
        ipv4_address: 172.1.0.3
  php-fpm:
    build:
      context: ./versions/${PHPVERSION}
    image: "${PROJECT_NAME}-${PHPVERSION}"
    container_name: "${PROJECT_NAME}-php-fpm"
    hostname: "php-fpm_server"
    user: "${UID}:${GID}"
    pull_policy: never                   # Require a custom image built first, step 2
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${HOST_PHP_PORT}:9000"
    environment:
      - PHP_INI_DIR=/usr/local/etc/php
      - PHP_PREFIX=/opt/php-8.5
    volumes:
      - ${DOCUMENT_ROOT}:/var/www/html:ro
      - ${MYSQL_CERT_DIR}:/opt/php/mysql_certs
      - ./etc/php.ini:/opt/php/etc/php/php.ini
    networks:
      custom_network:
        ipv4_address: 172.1.0.4
        
networks:
  custom_network:
    ipam:
      config:
        - subnet: 172.1.0.0/16
